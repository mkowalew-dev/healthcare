# ── Splunk OTel Collector — VM5 (PACS / local)
# Collects: host metrics, PACS Node.js APM traces (OTLP), PACS JSON logs
# The PACS server (@splunk/otel) sends traces to this collector via OTLP
# (OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317 in server .env).
#
# Traces  → Splunk Observability Cloud APM  (careconnect-pacs service)
# Metrics → Splunk Observability Cloud Infrastructure Monitoring
# Logs    → Splunk Platform via HEC  (sourcetype: careconnect:json)

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 127.0.0.1:55679

receivers:
  # ── OTLP — receives traces from PACS Node.js server ────────
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  # ── Host metrics ────────────────────────────────────────────
  hostmetrics:
    collection_interval: 10s
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      disk:
      filesystem:
        exclude_mount_points:
          mount_points: [/dev, /proc, /sys, /run]
          match_type: strict
      network:
      load:
      processes:

  # ── PACS server logs (structured JSON from Winston) ─────────
  file_log/pacs:
    include:
      - /var/log/careconnect/pacs-out.log
      - /var/log/careconnect/pacs-error.log
    include_file_path: true
    start_at: end
    operators:
      - type: json_parser
        on_error: drop_quiet
        timestamp:
          parse_from: attributes.timestamp
          layout: '%Y-%m-%dT%H:%M:%S.%LZ'
        severity:
          parse_from: attributes.level
          mapping:
            error: error
            warn:  warn
            info:  info
            debug: debug
      - type: move
        from: attributes.trace_id
        to:   attributes["trace_id"]
      - type: move
        from: attributes.span_id
        to:   attributes["span_id"]

processors:
  memory_limiter:
    check_interval: 5s
    limit_mib: 256
    spike_limit_mib: 64

  batch:
    send_batch_size: 512
    timeout: 5s

  resourcedetection:
    detectors: [system, env]
    timeout: 10s
    override: false

  resource/pacs:
    attributes:
      - key: deployment.environment
        value: ${env:APP_ENV}
        action: upsert
      - key: service.version
        value: ${env:APP_VERSION}
        action: upsert
      - key: service.name
        value: careconnect-pacs
        action: insert
      - key: host.role
        value: pacs
        action: insert

  # ── Tag WADO image-delivery spans with image.modality ───────
  # The PACS server sets http.url on WADO spans; extract modality
  # from the ?studyUID= query param prefix to enable per-modality
  # latency breakdowns in Splunk APM.
  transform/wado:
    trace_statements:
      - context: span
        statements:
          - set(attributes["pacs.endpoint"], "wado") where IsMatch(attributes["http.route"], "/wado.*")
          - set(attributes["pacs.endpoint"], "worklist") where IsMatch(attributes["http.route"], "/api/worklist.*")

exporters:
  otlp_grpc/splunk_apm:
    endpoint: ingest.${env:SPLUNK_REALM}.signalfx.com:443
    headers:
      X-SF-Token: ${env:SPLUNK_ACCESS_TOKEN}

  signalfx:
    access_token: ${env:SPLUNK_ACCESS_TOKEN}
    realm: ${env:SPLUNK_REALM}
    timeout: 30s

  splunk_hec/platform:
    token: ${env:SPLUNK_PLATFORM_HEC_TOKEN}
    endpoint: ${env:SPLUNK_PLATFORM_HEC_URL}
    source: careconnect-pacs
    sourcetype: careconnect:json
    index: o11y_logs
    timeout: 10s
    tls:
      insecure_skip_verify: false

service:
  extensions: [health_check, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resourcedetection, resource/pacs, transform/wado, batch]
      exporters: [otlp_grpc/splunk_apm]
    metrics:
      receivers: [hostmetrics]
      processors: [memory_limiter, resourcedetection, resource/pacs, batch]
      exporters: [signalfx]
    logs:
      receivers: [file_log/pacs]
      processors: [memory_limiter, resourcedetection, resource/pacs, batch]
      exporters: [splunk_hec/platform]

  telemetry:
    logs:
      level: warn
