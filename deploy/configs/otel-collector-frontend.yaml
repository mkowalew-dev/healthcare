# ── Splunk OTel Collector — VM1 (Frontend)
# Collects: host metrics, Nginx access/error logs, BFF app logs
# Exports to: Splunk Observability Cloud (metrics) + Splunk Platform (logs)

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 127.0.0.1:55679

receivers:
  # ── Host metrics (CPU, memory, disk, network) ──────────────
  hostmetrics:

    collection_interval: 10s
    scrapers:
      cpu:
        metrics:
          system.cpu.utilization:
            enabled: true
      memory:
        metrics:
          system.memory.utilization:
            enabled: true
      disk:
      filesystem:
        exclude_mount_points:
          mount_points: [/dev, /proc, /sys, /run]
          match_type: strict
      network:
      load:
      processes:

  # ── Nginx access + error logs ───────────────────────────────
  file_log/nginx:
    include:
      - /var/log/nginx/access.log
      - /var/log/nginx/error.log
    include_file_path: true
    start_at: end

  # ── BFF app logs (systemd journal) ─────────────────────────
  journald/bff:
    units:
      - careconnect-bff
    priority: info

processors:
  # ── Memory protection ───────────────────────────────────────
  memory_limiter:
    check_interval: 5s
    limit_mib: 256
    spike_limit_mib: 64

  # ── Batch for efficiency ────────────────────────────────────
  batch:
    send_batch_size: 512
    timeout: 5s

  # ── Auto-detect host/cloud resource attributes ──────────────
  resourcedetection:
    detectors: [system, env, ec2]
    timeout: 10s
    override: false

  # ── Add service-level resource attributes ──────────────────
  resource/frontend:
    attributes:
      - key: deployment.environment
        value: ${env:APP_ENV}
        action: upsert
      - key: service.version
        value: ${env:APP_VERSION}
        action: upsert
      - key: service.name
        value: careconnect-frontend
        action: upsert
      - key: host.role
        value: frontend
        action: insert

exporters:
  # ── Metrics → Splunk Infrastructure Monitoring ──────────────
  signalfx:
    access_token: ${env:SPLUNK_ACCESS_TOKEN}
    realm: ${env:SPLUNK_REALM}
    timeout: 30s

  # ── Logs → Splunk Platform ──────────────────────────────────
  splunk_hec/platform:
    token: ${env:SPLUNK_PLATFORM_HEC_TOKEN}
    endpoint: ${env:SPLUNK_PLATFORM_HEC_URL}
    source: careconnect-frontend
    sourcetype: careconnect:log
    index: o11y_logs
    timeout: 10s
    tls:
      insecure_skip_verify: false

service:
  extensions: [health_check, zpages]
  pipelines:
    metrics:
      receivers: [hostmetrics]
      processors: [memory_limiter, resourcedetection, resource/frontend, batch]
      exporters: [signalfx]
    logs:
      receivers: [file_log/nginx, journald/bff]
      processors: [memory_limiter, resourcedetection, resource/frontend, batch]
      exporters: [splunk_hec/platform]

  telemetry:
    logs:
      level: warn
