# CareConnect Mirror Portal — nginx site configuration
# Deploy: /etc/nginx/sites-available/careconnect-mirror
# Enable: ln -s /etc/nginx/sites-available/careconnect-mirror /etc/nginx/sites-enabled/

server {
    listen 10566;
    server_name mirror.pseudo-co.com;

    root /var/www/html;
    autoindex off;

    # Serve file.pptx at / — 404 for any other path
    location / {
        try_files /file.pptx =404;

        add_header Content-Type "application/vnd.openxmlformats-officedocument.presentationml.presentation";
        add_header Content-Disposition 'attachment; filename="file.pptx"';
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/mirror.access.log;
    error_log  /var/log/nginx/mirror.error.log;
}
