name: Portal Release

# Triggers:
#   1. Push to main with changes under portal/ → build + save artifact (30d)
#   2. Push of a portal-vX.Y.Z tag           → build + create GitHub Release
on:
  push:
    branches:
      - main
    paths:
      - 'portal/**'
    tags:
      - 'portal-v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build-and-release:
    name: Build Portal
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: portal

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check + Vite build
        run: npm run build

      # Derive artifact name from package.json version so the tarball always
      # matches the version string declared in the source.
      - name: Read version
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Package release artifact
        run: make release VERSION=${{ steps.ver.outputs.version }}

      # Always upload the tarball as a workflow artifact (available for 30 days)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: careconnect-portal-${{ steps.ver.outputs.version }}-${{ github.sha }}
          path: portal/careconnect-portal-${{ steps.ver.outputs.version }}.tar.gz
          retention-days: 30
          if-no-files-found: error

      # On a tag push, also publish a versioned GitHub Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/portal-v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${{ steps.ver.outputs.version }}"
          ARTIFACT="careconnect-portal-${VERSION}.tar.gz"

          gh release create "${TAG}" "${ARTIFACT}" \
            --title "CareConnect Portal v${VERSION}" \
            --notes "$(cat <<'NOTES'
          ## CareConnect Internal Portal — v${VERSION}

          Self-contained Ubuntu release. Includes the compiled SPA, nginx configs, and installer.

          ### Install on Ubuntu
          \`\`\`bash
          tar -xzf careconnect-portal-${VERSION}.tar.gz
          cd careconnect-portal-${VERSION}
          sudo ./install.sh                    # main portal on :8090
          sudo ./install.sh --port 9000        # custom port
          sudo ./install.sh --mirror           # also install mirror site on :10566
          sudo ./install.sh --uninstall        # remove portal
          sudo ./install.sh --uninstall --mirror  # remove portal + mirror site
          \`\`\`

          ### Mirror site (nginx-mirror.conf)
          The `--mirror` flag installs a second nginx site on port 10566 (`mirror.pseudo-co.com`)
          that serves `/var/www/html/file.pptx`. Place the file at that path before enabling the site.

          ### Update an existing install
          Pull the new tarball, extract, and re-run \`sudo ./install.sh\` — it overwrites the previous deployment.
          NOTES
          )"
